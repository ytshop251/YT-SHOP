<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#0a0a0a"/>
  <defs>
    <pattern id="g" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#0a0a0a"/>
      <rect x="0" y="0" width="2" height="2" fill="#111"/>
      <rect x="4" y="4" width="2" height="2" fill="#101010"/>
    </pattern>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#g)"/>
  <!-- "YT" wordmark -->
  <text x="256" y="306" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="196" fill="#f5f5f0" text-anchor="middle" letter-spacing="4">YT</text>
  <!-- bottom label -->
  <text x="256" y="394" font-family="'Courier New', monospace" font-size="48" fill="#555" text-anchor="middle" letter-spacing="18">SHOP</text>
  <!-- accent lines -->
  <rect x="64" y="148" width="384" height="3" fill="#222"/>
  <rect x="64" y="420" width="384" height="3" fill="#222"/>
</svg>
