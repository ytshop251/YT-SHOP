<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="32" fill="#0a0a0a"/>
  <!-- subtle noise texture via pattern -->
  <defs>
    <pattern id="g" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#0a0a0a"/>
      <rect x="0" y="0" width="1" height="1" fill="#161616"/>
      <rect x="2" y="2" width="1" height="1" fill="#141414"/>
    </pattern>
  </defs>
  <rect width="192" height="192" rx="32" fill="url(#g)"/>
  <!-- "YT" wordmark -->
  <text x="96" y="112" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="72" fill="#f5f5f0" text-anchor="middle" letter-spacing="2">YT</text>
  <!-- bottom label -->
  <text x="96" y="148" font-family="'Courier New', monospace" font-size="18" fill="#666" text-anchor="middle" letter-spacing="6">SHOP</text>
  <!-- top accent line -->
  <rect x="32" y="56" width="128" height="2" fill="#333"/>
</svg>
